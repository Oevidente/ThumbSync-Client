<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>ThumbSync</title>
  <!-- Configurações PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#070709" />
  <!-- Compatibilidade iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ThumbSync" />

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="fonts.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['SF Pro Text', 'SF Pro', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            display: ['SF Pro Display', 'SF Pro', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            rounded: ['SF Pro Rounded', 'SF Pro', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          fontSize: {
            // Exact Apple HIG Dynamic Type mappings for iOS
            'caption-2': ['11px', { lineHeight: '13px', letterSpacing: '0.07px' }], // Caption 2
            'caption-1': ['12px', { lineHeight: '16px', letterSpacing: '0.00px' }], // Caption 1
            'footnote': ['13px', { lineHeight: '18px', letterSpacing: '-0.08px' }], // Footnote
            'subhead': ['15px', { lineHeight: '20px', letterSpacing: '-0.24px' }], // Subhead
            'callout': ['16px', { lineHeight: '21px', letterSpacing: '-0.32px' }], // Callout
            'body': ['17px', { lineHeight: '22px', letterSpacing: '-0.41px' }], // Body
            'headline': ['17px', { lineHeight: '22px', letterSpacing: '-0.41px' }], // Headline (needs semibold)
            'title-3': ['20px', { lineHeight: '25px', letterSpacing: '0.38px' }], // Title 3
            'title-2': ['22px', { lineHeight: '28px', letterSpacing: '0.35px' }], // Title 2
            'title-1': ['28px', { lineHeight: '34px', letterSpacing: '0.36px' }], // Title 1
            'large-title': ['34px', { lineHeight: '41px', letterSpacing: '0.37px' }], // Large Title

            // Default Tailwind overrides for convenience, mapping to HIG
            'xs': ['12px', { lineHeight: '16px', letterSpacing: '0.00px' }],
            'sm': ['15px', { lineHeight: '20px', letterSpacing: '-0.24px' }],
            'base': ['17px', { lineHeight: '22px', letterSpacing: '-0.41px' }],
            'lg': ['20px', { lineHeight: '25px', letterSpacing: '0.38px' }],
            'xl': ['22px', { lineHeight: '28px', letterSpacing: '0.35px' }],
            '2xl': ['28px', { lineHeight: '34px', letterSpacing: '0.36px' }],
            '3xl': ['34px', { lineHeight: '41px', letterSpacing: '0.37px' }],
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    /* Base Typography */
    body {
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.41px;
      font-weight: 400;
      background-color: #000000;
      /* Pure black for iOS dark mode */
      color: #f2f2f7;
      /* iOS label color */
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Apple HIG specific heading weights */
    /* Removido o seletor de font-family fixo por tamanho para permitir que font-rounded/font-display funcionem */

    .text-large-title,
    .text-3xl,
    h1 {
      font-weight: 400;
    }

    .text-title-1,
    .text-2xl {
      font-weight: 400;
    }

    .text-title-2,
    .text-xl {
      font-weight: 400;
    }

    .text-title-3,
    .text-lg {
      font-weight: 400;
    }

    .text-headline {
      font-weight: 600 !important;
    }

    /* Enforce Apple HIG constraints on arbitrary utility classes used in markup */
    /* Ajustado para não usar !important, permitindo sobrescrita quando necessário */
    .font-black,
    .font-extrabold {
      font-weight: 600;
    }

    .text-\\[9px\\],
    .text-\\[10px\\],
    .text-\\[11px\\],
    .text-\\[11\\.5px\\] {
      font-size: 11px;
      line-height: 13px;
      letter-spacing: 0.07px;
    }


    /* Custom scrollbars */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>

  <!-- Google Identity Services (GIS) library for browser OAuth -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="app.js"></script>
</body>

</html>
