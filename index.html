<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ThumbSync</title>
    <!-- Configurações PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#070709" />
    <!-- Compatibilidade iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ThumbSync" />
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="fonts.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['SF Pro Text', 'SF Pro', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Segoe UI', 'Roboto', 'sans-serif'],
              display: ['SF Pro Display', 'SF Pro', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
              rounded: ['SF Pro Rounded', 'SF Pro', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            },
            fontSize: {
              // HIG Semantic Sizes mapped to Tailwind default names
              'xs': ['12px', { lineHeight: '16px', letterSpacing: '0.00px' }], // Caption 1
              'sm': ['15px', { lineHeight: '20px', letterSpacing: '-0.24px' }], // Subhead
              'base': ['17px', { lineHeight: '22px', letterSpacing: '-0.43px' }], // Body
              'lg': ['20px', { lineHeight: '25px', letterSpacing: '0.38px' }], // Title 3
              'xl': ['22px', { lineHeight: '28px', letterSpacing: '0.35px' }], // Title 2
              '2xl': ['28px', { lineHeight: '34px', letterSpacing: '0.36px' }], // Title 1
              '3xl': ['34px', { lineHeight: '41px', letterSpacing: '0.37px' }], // Large Title
            }
          }
        }
      }
    </script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
      
      /* Base Typography */
      body {
        font-family: 'SF Pro Text', -apple-system, system-ui, sans-serif;
        font-size: 17px;
        line-height: 22px;
        letter-spacing: -0.43px;
        background-color: #0c0c0e;
        color: #f4f4f5;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* HIG Tracking for explicitly sized small text */
      .text-\\[7px\\], .text-\\[7\\.5px\\] { letter-spacing: 0.37px; }
      .text-\\[8px\\] { letter-spacing: 0.26px; }
      .text-\\[9px\\] { letter-spacing: 0.20px; }
      .text-\\[10px\\] { letter-spacing: 0.12px; }
      .text-\\[11px\\], .text-\\[11\\.5px\\] { letter-spacing: 0.07px; /* HIG Caption 2 */ }
      .text-\\[13px\\] { letter-spacing: -0.08px; /* HIG Footnote */ }
      
      /* Force Display font for larger headings */
      .text-lg, .text-xl, .text-2xl, .text-3xl {
        font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif !important;
      }

      /* Global Heading Weight Adjustments per HIG */
      h1, .text-3xl, .text-2xl { font-weight: 700; /* Bold */ }
      h2, h3, .text-xl, .text-lg { font-weight: 600; /* Semibold */ }
      
      /* Custom scrollbars */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 99px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }
    </style>

    <!-- Google Identity Services (GIS) library for browser OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
